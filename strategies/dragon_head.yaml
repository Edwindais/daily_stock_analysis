# Dragon Head Strategy / 龙头策略
# Identifies sector leaders during sector rotation cycles.

name: dragon_head
display_name: 龙头策略
description: 板块轮动中识别龙头股。适用于板块启动或行业催化剂出现时。
category: trend
core_rules: [2, 7]
required_tools:
  - get_a_share_flow_context
  - get_market_breadth
  - get_sector_rankings
  - get_realtime_quote
  - search_stock_news

instructions: |
  **龙头策略（Dragon Head Strategy）**

  评估标准：

  1. **板块领涨地位**：
     - 使用 `get_sector_rankings` 和 `get_a_share_flow_context` 检查该股所在板块是否同时处于涨幅前列和资金流入前列。
     - 确认该股是否在板块启动周期中率先上涨、涨停或显著强于板块平均。

  2. **板块环境确认**：
     - 使用 `get_market_breadth` 检查市场是否支持高位进攻。
     - 若跌停家数增加、涨停家数收缩，龙头持续性要打折。

  3. **换手率与动能**（关联理念7：强势趋势股放宽）：
     - 使用 `get_realtime_quote` 检查换手率。龙头股换手率通常 > 5%。
     - 量比 > 1.5 说明有活跃的交易兴趣。

  4. **资金与龙虎榜确认**：
     - 使用 `get_a_share_flow_context` 检查主力资金、北向/融资方向、龙虎榜活跃度。
     - 只有板块热度、板块资金、龙虎榜/换手确认同时满足，才可视为高质量龙头。

  5. **相对强度**：
     - 对比个股涨跌幅与板块平均值。
     - 真正的龙头在上涨日应跑赢板块 2% 以上。

  6. **新闻催化**：
     - 使用 `search_stock_news` 搜索板块级催化剂（政策、事件、业绩）。
     - 龙头行情常伴随板块整体催化。

  7. **乖离率检查**（关联理念1：严进策略）：
     - 龙头股可适当放宽乖离率至 7%，但超过 10% 仍需谨慎。

  评分调整：
  - 确认为龙头股：sentiment_score +10
  - 板块正处于主动轮动期：额外 +5
  - 在 `buy_reason` 中注明"龙头策略"判断结果。
